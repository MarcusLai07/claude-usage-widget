name: ClaudeUsage
options:
  bundleIdPrefix: com.marcuslai
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: P7DV5ZUK9A
    CURRENT_PROJECT_VERSION: 4
    MARKETING_VERSION: 0.3.0
targets:
  ClaudeUsage:
    type: application
    platform: macOS
    sources: [App, Shared]
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Claude Usage
        CFBundleName: Claude Usage
        CFBundleIconFile: AppIcon
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSUIElement: true
        LSApplicationCategoryType: public.app-category.developer-tools
    entitlements:
      path: App/ClaudeUsage.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-only: true
        com.apple.security.application-groups:
          - group.com.marcuslai.ClaudeUsage
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.marcuslai.ClaudeUsage.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.marcuslai.ClaudeUsage
    dependencies:
      - target: ClaudeUsageWidget
  ClaudeUsageWidget:
    type: app-extension
    platform: macOS
    sources:
      - Widget
      - Shared
      - path: App/Resources/AppIcon.icns
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: Claude Usage
        CFBundleName: Claude Usage
        CFBundleIconFile: AppIcon
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Widget/ClaudeUsageWidget.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.application-groups:
          - group.com.marcuslai.ClaudeUsage
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.marcuslai.ClaudeUsage.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.marcuslai.ClaudeUsage.Widget
